name: deploy-bot-to-fly

# Builds and deploys the bot to Fly.io (Frankfurt) — no local terminal needed.
# Requires repo secret FLY_API_TOKEN (Fly dashboard -> Tokens -> Create deploy token).
# The bot's own secrets are pushed to Fly from the GitHub secrets below.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - "fly.toml"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create the Fly app if it doesn't exist yet
        run: flyctl apps create "$(grep -E '^app' fly.toml | head -1 | cut -d'"' -f2)" || true

      - name: Push the bot's secrets to Fly (staged, applied on deploy)
        run: |
          flyctl secrets set --stage \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            FINNHUB_API_KEY="${{ secrets.FINNHUB_API_KEY }}" \
            BINANCE_API_KEY="${{ secrets.BINANCE_API_KEY }}" \
            BINANCE_SECRET_KEY="${{ secrets.BINANCE_SECRET_KEY }}" \
            DATABASE_URL="${{ secrets.DATABASE_URL }}"

      - name: Deploy
        run: flyctl deploy --remote-only --ha=false
