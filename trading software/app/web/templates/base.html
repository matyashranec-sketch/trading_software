<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Prediction Tracker{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/">📈 Prediction Tracker</a></div>
    <nav>
      <a href="/" class="{{ 'active' if active_page == 'leaderboard' else '' }}">Leaderboard</a>
      <a href="/predictions" class="{{ 'active' if active_page == 'predictions' else '' }}">Predikce</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    Každá predikce zůstává navždy viditelná — i ty špatné.
    &nbsp;🟢 trefa · 🔴 miss · ⚪ čeká
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
